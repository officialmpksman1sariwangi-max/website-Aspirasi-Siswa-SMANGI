<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Aspirasi & Layanan Siswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🗳️ Kirim Aspirasi</h2>
    <p class="subtitle">Sampaikan pendapatmu untuk kemajuan sekolah.</p>
    <span class="anon-badge">🔒 Identitas Dijamin Anonim</span>

    <form id="formAspirasi">
        <div class="form-group">
            <label for="kategori">Kategori</label>
            <select id="kategori" name="kategori" required>
                <option value="" disabled selected>Pilih Kategori...</option>
                <option value="Fasilitas Sekolah">Fasilitas Sekolah</option>
                <option value="Kegiatan Belajar Mengajar">Kegiatan Belajar Mengajar</option>
                <option value="Ekstrakurikuler">Ekstrakurikuler</option>
                <option value="Kinerja OSIS MPK">Kinerja OSIS MPK</option>
            </select>
        </div>
        <div class="form-group">
            <label for="pesan">Pesan / Masukan</label>
            <textarea id="pesan" name="pesan" placeholder="Tulis aspirasimu dengan sopan dan jelas..." required></textarea>
        </div>
        <button type="submit" id="btnKirim">Kirim Aspirasi</button>
    </form>
    <div id="statusKirim" class="alert"></div>
</div>

<div class="container">
    <h2>🔍 Cek Status Laporan</h2>
    <p class="subtitle">Masukkan Kode Tiket untuk melihat respons dari Admin.</p>
    
    <div class="form-group">
        <input type="text" id="inputTiket" placeholder="Contoh: ASP-12345" style="text-transform: uppercase;">
    </div>
    <button id="btnCek" class="btn-check">Cek Status</button>

    <div id="hasilCek" class="result-box">
        <p style="margin-top:0;"><strong>Status:</strong> <span id="lblStatus" style="font-weight: bold; color: #d97706;">-</span></p>
        <p style="margin-bottom: 0.5rem;"><strong>Balasan Admin:</strong></p>
        <div id="lblBalasan" class="admin-reply">-</div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
